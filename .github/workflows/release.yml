name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate release files
        run: |
          test -f action.yml
          test -f dist/action.cjs
          test -f dist/action.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            action.yml
            dist/action.cjs
            dist/action.js
