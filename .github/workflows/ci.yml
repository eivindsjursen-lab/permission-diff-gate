name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate required files
        run: |
          test -f action.yml
          test -f dist/action.cjs
          test -f dist/action.js
          test -f LICENSE
          test -f README.md
